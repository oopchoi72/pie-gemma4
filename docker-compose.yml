services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: pie-gemma4-server
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      PIE_MODE: ${PIE_MODE:-web-agent}
      PIE_CWD: /app
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
      OLLAMA_API_KEY: ollama
      MODEL_NAME: ${MODEL_NAME:-gemma4:12b}
      MODELS_JSON_PATH: /app/.pie/models.docker.json
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./docker/models.json:/app/.pie/models.docker.json:ro
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: pie-gemma4-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"
